<app-header [title]="title" [title2]="title2" [actions]="actions" [titleLongPress]="titleLongPressEvent"></app-header>
@if (trailsType === 'search') {
  @if (!(connected$ | async)) {
    <div class="disconnected-message {{mapLayerService.darkMapEnabled ? 'dark-theme' : 'light-theme'}}">
      <div>{{ i18n.texts.you_are_offline }}</div>
    </div>
  }
}
@if (viewId) {
  <app-trails-and-map
    #trailsAndMap
    [trails$]="(trails$ | async) ?? undefined"
    [bubbles$]="bubbles$"
    [showBubbles$]="showBubbles$"
    [bubblesToolAvailable$]="bubblesToolAvailable$"
    [viewId]="viewId"
    [collectionUuid]="trailsType === 'collection' ? trailsId : undefined"
    [type]="trailsType"
    [message]="searchMessage"
    [enableRemoveByGesture]="trailsType === 'search'"
    [enableSearchPlace]="true"
    [mapTopToolbar$]="trailsType === 'search' ? mapTopToolbar$ : undefined"
    [showPublished]="trailsType === 'collection' || trailsType === 'all-collections'"
    [searching]="searching"
  >
    @if (userProfile) {
      <div class="before-list-toolbar">
        <div class="user-profile">
          <app-avatar [uuid]="userProfile.avatar" [name]="userProfile.alias" [anonymous]="!userProfile.alias"></app-avatar>
          <div class="author-infos">
            <div class="author-name">
              {{ userProfile.alias || i18n.texts.pages.preferences.anonymous }}
            </div>
            <app-contributions-badges [contrib]="userProfile" style="justify-content: flex-start;"></app-contributions-badges>
          </div>
        </div>
      </div>
    }
  </app-trails-and-map>
}
