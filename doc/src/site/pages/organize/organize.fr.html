<h1>Organiser les parcours</h1>

<p>
Vous pouvez "ranger" vos parcours principalement de 2 manières:<ul>
  <li>En utilisant <a href="organize/collections.html">les collections</a> qui fonctionnent comme des "répertoires" de parcours</li>
  <li>En utilisant <a href="organize/tags.html">les tags</a> dans une collection qui fonctionnent comme des "étiquettes"</li>
</ul>
</p>
