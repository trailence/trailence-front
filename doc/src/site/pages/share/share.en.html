<h1>Share trails</h1>

<p>
  You can share trails:
  <ul>
    <li>Privately with friends by <a href="share/create-share.html">creating a share</a> from your trails.</li>
    <li>By <a href="share/create-link.html">creating a link</a> for a trail that you can then send.</li>
    <li>By <a href="share/publish.html">publishing</a> a trail to share it with the entire Trailence community.</li>
  </ul>
</p>
