<h1>Partager des parcours</h1>

<p>
  Vous pouvez partager des parcours:
  <ul>
    <li>Avec vos amis, de manière privée, en <a href="share/create-share.html">créant un partage</a> à partir de vos parcours.</li>
    <li>En <a href="share/create-link.html">créant un lien</a> sur un parcours, que vous pourrez ensuite envoyer.</li>
    <li>En <a href="share/publish.html">publiant</a> un parcours, pour le partager avec toute la communauté Trailence.</li>
  </ul>
</p>
